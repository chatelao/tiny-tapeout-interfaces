openapi: 3.0.0
info:
  title: Tiny Tapeout Gemini REST API
  version: 1.0.0
  description: API to interact with Tiny Tapeout hardware simulations and implementations.
paths:
  /pins:
    get:
      summary: Get current state of all pins
      parameters:
        - $ref: '#/components/parameters/target'
        - $ref: '#/components/parameters/address'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PinState'
  /pins/{pin_name}:
    put:
      summary: Set state of an input pin
      parameters:
        - name: pin_name
          in: path
          required: true
          schema:
            type: string
            enum: [ui_in, uo_out, uio]
            example: ui_in
        - $ref: '#/components/parameters/target'
        - $ref: '#/components/parameters/address'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  type: integer
                  enum: [0, 1]
                  example: 1
      responses:
        '200':
          description: OK
components:
  parameters:
    target:
      name: target
      in: query
      description: Tiny Tapeout target chip
      schema:
        type: string
        enum: [tt01, tt02, tt03, tt04, tt05, tt06, tt07, tt08, tt09, ttihp0p2, ttihp0p4, ttihp25a, ttihp25b, ttihp26a, ttgf0p2, ttsky25a, ttsky25b, ttsky26a, ttgf26a, ttihp26b, ttsky26b, ttsky26c]
        example: tt08
    address:
      name: address
      in: query
      description: Address on the chip
      schema:
        type: integer
        example: 0
  schemas:
    PinState:
      type: object
      properties:
        ui_in:
          type: integer
          format: uint8
          example: 0
        uo_out:
          type: integer
          format: uint8
          example: 0
        uio:
          type: integer
          format: uint8
          example: 0
