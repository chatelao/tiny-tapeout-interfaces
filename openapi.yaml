openapi: 3.0.0
info:
  title: Tiny Tapeout Gemini REST API
  version: 2.0.0
  description: API to perform batch simulation of Tiny Tapeout hardware implementations.
paths:
  /simulation:
    post:
      summary: Run a batch simulation
      description: Apply a sequence of inputs and receive the resulting outputs. If target is omitted, a random board is selected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResponse'
components:
  schemas:
    SimulationRequest:
      type: object
      properties:
        target:
          type: string
          enum: [tt01, tt02, tt03, tt04, tt05, tt06, tt07, tt08, tt09, ttihp0p2, ttihp0p4, ttihp25a, ttihp25b, ttihp26a, ttgf0p2, ttsky25a, ttsky25b, ttsky26a, ttgf26a, ttihp26b, ttsky26b, ttsky26c]
          example: tt08
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/InputState'
    SimulationResponse:
      type: object
      properties:
        target:
          type: string
          example: tt08
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/OutputState'
    InputState:
      type: object
      properties:
        ui_in:
          type: integer
          format: uint8
          example: 0
        uio_in:
          type: integer
          format: uint8
          example: 0
        ena:
          type: boolean
          example: true
        rst_n:
          type: boolean
          example: true
        clock:
          type: string
          enum: ['0', '1', '01', '10']
          example: '0'
    OutputState:
      type: object
      properties:
        uo_out:
          type: integer
          format: uint8
          example: 0
        uio_out:
          type: integer
          format: uint8
          example: 0
        uio_oe:
          type: integer
          format: uint8
          example: 0
