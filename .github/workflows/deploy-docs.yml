name: Deploy REST API Docs
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Lint OpenAPI Spec
        run: npx @redocly/cli lint tt_openapi.yaml
      - name: Run Tests
        run: |
          for test_dir in test/*/ ; do
            if [ -f "${test_dir}install.sh" ] && [ -f "${test_dir}run_tests.sh" ]; then
              echo "Running tests in ${test_dir}..."
              cd "${test_dir}"
              ./install.sh
              ./run_tests.sh
              cd -
            fi
          done
      - name: Build Docs
        run: npx @redocly/cli build-docs tt_openapi.yaml -o index.html
      - name: Prepare for deployment
        run: |
          mkdir -p public
          mv index.html public/
          cp tt_*.md tt_*.v tt_*.ts README.md GEMINI.md public/
          cp -r specifications/ public/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
